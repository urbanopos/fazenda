<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazenda São José</title>
<style>
  body{margin:0;background:#1c2e22;display:flex;align-items:center;
  justify-content:center;min-height:100vh;font-family:sans-serif;color:#fff;
  flex-direction:column;text-align:center;padding:24px}
  .icone{font-size:64px;margin-bottom:20px}
  .msg{font-size:16px;opacity:.7;max-width:280px;line-height:1.6}
</style>
</head>
<body>
<div class="icone">🌿</div>
<div class="msg">Redirecionando para o sistema da Fazenda São José...</div>
<script>
  // Grava o bloqueio no dispositivo e redireciona para o app
  localStorage.setItem('fsj_bloqueado','1');
  localStorage.setItem('fsj_blk_msg',
    'Este aplicativo foi desativado.\nContacte a Fazenda São José.');
  // Redireciona após 1 segundo
  setTimeout(()=>{
    window.location.href = 'https://urbanopos.github.io/fazenda/coleta.html';
  }, 1000);
</script>
</body>
</html>
